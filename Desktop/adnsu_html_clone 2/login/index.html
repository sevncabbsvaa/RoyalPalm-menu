<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ASOIU LMS</title>
  <link rel="icon" href="../assets/logo.png">
  <link rel="stylesheet" href="styles.css"> 
</head>
<body class="login-page" data-page="login" data-default-lang="ru">
  <div class="page-shell">
    <div class="language-selector">
      <div class="lang-dropdown" id="langDropdown">
        <button class="lang-button" id="langButton" type="button" aria-label="Language" aria-expanded="false">
          <span class="lang-mobile-label">Язык:</span>
          <img id="currentLangFlag" src="../assets/flag-ru.png" alt="Русский flag">
          <span class="lang-current-name">Русский</span>
          <span class="lang-mobile-caret">▼</span>
        </button>

        <div class="lang-menu" id="langMenu" role="menu">
          <button class="lang-option" type="button" data-lang="en" role="menuitem">
            <img src="../assets/flag-en.png" alt="English flag">
            <span>English</span>
          </button>
          <button class="lang-option" type="button" data-lang="az" role="menuitem">
            <img src="../assets/flag-az.png" alt="Azərbaycan flag">
            <span>Azərbaycan</span>
          </button>
          <button class="lang-option active" type="button" data-lang="ru" role="menuitem">
            <img src="../assets/flag-ru.png" alt="Русский flag">
            <span>Русский</span>
          </button>
        </div>
      </div>
    </div>

    <main class="login-layout">
      <form class="login-card" id="loginForm" autocomplete="off">
        <div class="logo-wrap">
          <img class="main-logo" src="../assets/logo.png" alt="ADNSU logo">
        </div>

        <h1 class="login-title" data-i18n="title">Добро пожаловать</h1>
        <p class="login-subtitle" data-i18n="subtitle">Войдите в систему</p>

        <div class="form-field">
          <label class="field-label" for="username" data-i18n="username">Имя пользователя</label>
          <input class="text-input" id="username" name="username" type="text" autocomplete="username">
        </div>

        <div class="form-field">
          <label class="field-label" for="password" data-i18n="password">Пароль</label>
          <div class="password-holder">
            <input class="text-input" id="password" name="password" type="password" autocomplete="current-password">
            <button class="show-password" id="togglePassword" type="button" data-i18n="show">Показать</button>
          </div>
        </div>

        <div class="forgot-row">
          <a class="forgot-link" href="#" data-i18n="forgot">Забыли пароль?</a>
        </div>

        <button class="primary-btn" type="submit" data-i18n="signIn">Войти</button>

        <div class="continue-text" data-i18n="continue">или продолжить с</div>

        <a class="secondary-btn" id="magicLinkButton" href="/accounts/magic" data-i18n="magicLink">Отправить одноразовую ссылку</a>
      </form>
    </main>

    <footer class="page-footer">©Copyright 2026 - ADNSU</footer>

    <div class="recaptcha-badge open-recartcha" aria-hidden="true">
      <img class="recaptcha-collapsed" src="../assets/recaptcha-collapsed.png" alt="reCAPTCHA">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
